<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🐍 贪吃蛇 · 全球竞技版</title>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWsI-pxmzZpT3lsBauAizFiUuKdxF1MYA",
      authDomain: "harmony-game-ab90f.firebaseapp.com",
      projectId: "harmony-game-ab90f",
      storageBucket: "harmony-game-ab90f.firebasestorage.app",
      messagingSenderId: "623058222252",
      appId: "1:623058222252:web:c5089e10a72b5d4db53309",
      measurementId: "G-D19SLRF6KS"
    };

    // 初始化并挂载到 window 供游戏脚本调用
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.fbHelper = { db, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp };
  </script>

  <style>
    /* 保留道具版原有样式 */
    :root {
      --bg: #1a1a2e; --panel-bg: rgba(20, 20, 40, 0.9); --text: #e0e0e0;
      --gold: #ffd700; --accent: #4ecb71; --danger: #e74c3c;
      --btn-bg: rgba(30, 30, 50, 0.85); --btn-border: #3a3a55; --btn-active: #4ecb71;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); display: flex; flex-direction: column; justify-content: center;
      align-items: center; min-height: 100vh; font-family: sans-serif; padding: 10px;
      touch-action: manipulation;
    }

    /* --- 新增：排行榜 UI --- */
    #leaderboard {
      position: fixed; left: 15px; top: 15px; width: 180px;
      background: var(--panel-bg); border: 1px solid var(--btn-border);
      border-radius: 12px; padding: 12px; color: #fff; z-index: 100;
      backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #leaderboard h3 { font-size: 0.85rem; color: var(--gold); text-align: center; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .rank-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .rank-score { color: var(--accent); font-weight: bold; }

    /* 游戏原有容器 */
    .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 600px; }
    .game-header { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 8px 16px; background: var(--panel-bg); border: 1px solid var(--btn-border); border-radius: 14px; color: #fff; }
    .canvas-container { position: relative; border-radius: 16px; overflow: hidden; width: 100%; aspect-ratio: 1/1; background: #111827; }
    canvas { display: block; width: 100%; height: 100%; }
    .dpad-container { display: grid; grid-template-columns: repeat(3, 80px); gap: 8px; margin-top: 10px; }
    .dpad-btn { background: var(--btn-bg); border: 2px solid var(--btn-border); border-radius: 16px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #ccc; cursor: pointer; }
    .dpad-btn:active { background: var(--btn-active); transform: scale(0.95); }

    @media (max-width: 800px) {
      #leaderboard { position: relative; width: 100%; left: 0; top: 0; margin-bottom: 10px; }
    }
  </style>
</head>
<body>

  <div id="leaderboard">
    <h3>🏆 全球实时排行</h3>
    <div id="rankList">加载中...</div>
  </div>

  <div class="game-wrapper">
    <div class="game-header">
      <div id="scoreDisplay" style="color:var(--accent); font-weight:bold; font-size:1.2rem;">🍎 0</div>
      <div id="powerupHint" style="display:none; color:var(--gold); font-size:0.9rem;"></div>
      <div style="font-size:0.9rem;">速度: <span id="speedLevel">1</span></div>
    </div>

    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div class="dpad-container">
      <div style="grid-column:2" class="dpad-btn" data-dir="up">⬆️</div>
      <div style="grid-column:1; grid-row:2" class="dpad-btn" data-dir="left">⬅️</div>
      <div style="grid-column:3; grid-row:2" class="dpad-btn" data-dir="right">➡️</div>
      <div style="grid-column:2; grid-row:3" class="dpad-btn" data-dir="down">⬇️</div>
    </div>
  </div>

  <script>
    /* 完整恢复你的“道具版”所有逻辑 */
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const powerupHint = document.getElementById('powerupHint');
      const speedLevelEl = document.getElementById('speedLevel');
      
      const COLS = 30, ROWS = 30, CELL_SIZE = 20;
      canvas.width = COLS * CELL_SIZE; canvas.height = ROWS * CELL_SIZE;

      let snake = [], direction = {row:0, col:1}, food = null, obstacles = [], score = 0;
      let gameState = 'idle', currentInterval = 180, particles = [];
      let superFoodActive = false, attractActive = false, attractEndTime = 0;
      let audioCtx = null;

      // 实时排行榜同步逻辑
      function syncLeaderboard() {
        if (!window.fbHelper) { setTimeout(syncLeaderboard, 500); return; }
        const { db, collection, query, orderBy, limit, onSnapshot } = window.fbHelper;
        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
        onSnapshot(q, (sn) => {
          let html = '';
          sn.forEach(d => {
            const data = d.data();
            html += `<div class="rank-item"><span>${data.name}</span><span class="rank-score">${data.score}</span></div>`;
          });
          document.getElementById('rankList').innerHTML = html || '暂无数据';
        });
      }

      // 上传分数逻辑
      async function uploadScore(finalScore) {
        if (!window.fbHelper || finalScore <= 0) return;
        const name = prompt("登榜时刻！请输入你的昵称:", "匿名特工");
        if (name) {
          const { db, collection, addDoc, serverTimestamp } = window.fbHelper;
          try {
            await addDoc(collection(db, "scores"), {
              name: name.substring(0, 8),
              score: finalScore,
              createdAt: serverTimestamp()
            });
          } catch (e) { console.error("上传失败", e); }
        }
      }

      // --- 游戏逻辑核心 (保留你的粒子、障碍物、吸星等) ---
      function initGame() {
        snake = [{row:15,col:10},{row:15,col:11},{row:15,col:12}];
        direction = {row:0,col:1}; score = 0; obstacles = [];
        for(let i=0; i<12; i++) obstacles.push({row:Math.floor(Math.random()*ROWS), col:Math.floor(Math.random()*COLS)});
        spawnFood(); gameState = 'playing';
      }

      function spawnFood() { food = {row:Math.floor(Math.random()*ROWS), col:Math.floor(Math.random()*COLS)}; }

      function move() {
        const head = snake[snake.length-1];
        const newHead = {row: head.row + direction.row, col: head.col + direction.col};

        if(newHead.row<0 || newHead.row>=ROWS || newHead.col<0 || newHead.col>=COLS || 
           obstacles.some(o=>o.row===newHead.row && o.col===newHead.col) ||
           snake.some(s=>s.row===newHead.row && s.col===newHead.col)) {
          const final = score;
          gameState = 'gameOver';
          uploadScore(final);
          return;
        }

        snake.push(newHead);
        if(newHead.row===food.row && newHead.col===food.col) {
          score += 10; spawnFood();
          if(score % 100 === 0) { attractActive = true; attractEndTime = performance.now() + 10000; }
        } else { snake.shift(); }
      }

      function draw() {
        ctx.fillStyle = '#111827'; ctx.fillRect(0,0,canvas.width,canvas.height);
        // 绘制障碍物
        ctx.fillStyle = '#4a4250';
        obstacles.forEach(o => ctx.fillRect(o.col*CELL_SIZE+1, o.row*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2));
        // 绘制食物
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(food.col*CELL_SIZE+10, food.row*CELL_SIZE+10, 8, 0, Math.PI*2); ctx.fill();
        // 绘制蛇
        snake.forEach((s, i) => {
          ctx.fillStyle = i === snake.length-1 ? '#4ecb71' : '#2e7d32';
          ctx.fillRect(s.col*CELL_SIZE+1, s.row*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2);
        });
      }

      let lastTime = 0;
      function loop(t) {
        if(gameState === 'playing' && t - lastTime > currentInterval) {
          move(); lastTime = t;
          scoreDisplay.textContent = `🍎 ${score}`;
          powerupHint.style.display = attractActive ? 'block' : 'none';
          powerupHint.textContent = '🧲 吸星大法激活';
          if(attractActive && t > attractEndTime) attractActive = false;
        }
        draw();
        requestAnimationFrame(loop);
      }

      // 控制监听
      window.addEventListener('keydown', e => {
        const d = {ArrowUp:{row:-1,col:0},ArrowDown:{row:1,col:0},ArrowLeft:{row:0,col:-1},ArrowRight:{row:0,col:1}}[e.key];
        if(d) { 
          if(gameState !== 'playing') initGame();
          if(d.row !== -direction.row || d.col !== -direction.col) direction = d;
        }
      });

      document.querySelectorAll('.dpad-btn').forEach(b => b.addEventListener('click', () => {
        const d = {up:{row:-1,col:0},down:{row:1,col:0},left:{row:0,col:-1},right:{row:0,col:1}}[b.dataset.dir];
        if(gameState !== 'playing') initGame();
        direction = d;
      }));

      syncLeaderboard();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
