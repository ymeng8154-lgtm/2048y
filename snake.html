<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🐍 贪吃蛇 · 全球竞技版</title>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWsI-pxmzZpT3lsBauAizFiUuKdxF1MYA",
      authDomain: "harmony-game-ab90f.firebaseapp.com",
      projectId: "harmony-game-ab90f",
      storageBucket: "harmony-game-ab90f.firebasestorage.app",
      messagingSenderId: "623058222252",
      appId: "1:623058222252:web:37194d443d552744b53309",
      measurementId: "G-0V49SCW2L0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 挂载到全局方便游戏逻辑调用
    window.fbHelper = { db, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp };
  </script>

  <style>
    :root {
      --bg: #1a1a2e;
      --panel-bg: rgba(20, 20, 40, 0.9);
      --text: #e0e0e0;
      --gold: #ffd700;
      --accent: #4ecb71;
      --danger: #e74c3c;
      --btn-border: #3a3a55;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 10px;
      color: var(--text);
    }

    .game-wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; }
    
    .game-header {
      display: flex; justify-content: space-between; padding: 10px 15px;
      background: var(--panel-bg); border: 1px solid var(--btn-border); border-radius: 14px;
    }

    .canvas-container { 
        position: relative; width: 100%; aspect-ratio: 1/1; 
        background: #111827; border-radius: 16px; overflow: hidden; 
    }
    canvas { width: 100%; height: 100%; display: block; }

    /* 排行榜样式 */
    #leaderboard {
      background: var(--panel-bg); border: 1px solid var(--btn-border);
      border-radius: 14px; padding: 15px; margin-top: 5px;
    }
    .score-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .dpad-container {
      display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(3, 70px);
      gap: 8px; justify-content: center; margin-top: 10px;
    }
    .dpad-btn {
      background: rgba(30, 30, 50, 0.8); border: 2px solid var(--btn-border);
      border-radius: 12px; color: white; font-size: 1.5rem; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="game-wrapper">
    <div class="game-header">
      <div id="scoreDisplay" style="color: var(--accent); font-weight: bold;">🍎 0</div>
      <div id="powerupHint" style="color: var(--gold); display: none;"></div>
      <div>速度: <span id="speedLevel">1</span></div>
    </div>

    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="leaderboard">
      <h3 style="text-align: center; color: var(--gold); margin-bottom: 8px; font-size: 1rem;">🏆 全球排行榜 (实时)</h3>
      <div id="scoreList" style="font-size: 0.85rem; color: #bbb;">正在连接战场...</div>
    </div>

    <div class="dpad-container">
      <div style="grid-column: 2" class="dpad-btn" onclick="handleInput('up')">⬆️</div>
      <div style="grid-column: 1; grid-row: 2" class="dpad-btn" onclick="handleInput('left')">⬅️</div>
      <div style="grid-column: 3; grid-row: 2" class="dpad-btn" onclick="handleInput('right')">➡️</div>
      <div style="grid-column: 2; grid-row: 3" class="dpad-btn" onclick="handleInput('down')">⬇️</div>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreDisplay = document.getElementById('scoreDisplay');
      
      const COLS = 30, ROWS = 30, CELL = 20;
      canvas.width = COLS * CELL; canvas.height = ROWS * CELL;

      let snake = [], direction = {row:0, col:1}, food = null, score = 0;
      let gameState = 'IDLE'; // IDLE, PLAYING, GAMEOVER
      let lastTime = 0, interval = 150;

      function initGame() {
        snake = [{row:15, col:10}, {row:15, col:11}, {row:15, col:12}];
        direction = {row:0, col:1};
        score = 0;
        spawnFood();
        gameState = 'PLAYING';
      }

      function spawnFood() {
        food = { row: Math.floor(Math.random()*ROWS), col: Math.floor(Math.random()*COLS) };
      }

      function update() {
        if (gameState !== 'PLAYING') return;
        const head = snake[snake.length-1];
        const newHead = { row: head.row + direction.row, col: head.col + direction.col };

        // 碰撞检测
        if (newHead.row < 0 || newHead.row >= ROWS || newHead.col < 0 || newHead.col >= COLS || 
            snake.some(s => s.row === newHead.row && s.col === newHead.col)) {
          endGame();
          return;
        }

        snake.push(newHead);
        if (newHead.row === food.row && newHead.col === food.col) {
          score += 10;
          scoreDisplay.textContent = `🍎 ${score}`;
          spawnFood();
        } else {
          snake.shift();
        }
      }

      function draw() {
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 画食物
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(food.col*CELL + CELL/2, food.row*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
        ctx.fill();

        // 画蛇
        snake.forEach((s, i) => {
          ctx.fillStyle = i === snake.length-1 ? '#4ecb71' : '#2e7d32';
          ctx.fillRect(s.col*CELL+1, s.row*CELL+1, CELL-2, CELL-2);
        });

        if (gameState === 'IDLE') {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.fillText('点击方向键开始游戏', canvas.width/2, canvas.height/2);
        }
      }

      function gameLoop(time) {
        if (time - lastTime > interval) {
          update();
          draw();
          lastTime = time;
        }
        requestAnimationFrame(gameLoop);
      }

      // 结束游戏并上传分数
      async function endGame() {
        gameState = 'GAMEOVER';
        alert('游戏结束！得分：' + score);
        
        if (score > 0) {
          const name = prompt("进入英雄榜！请输入你的名字：", "匿名玩家");
          if (name && window.fbHelper) {
            const { db, collection, addDoc, serverTimestamp } = window.fbHelper;
            try {
              await addDoc(collection(db, "scores"), {
                name: name,
                score: score,
                timestamp: serverTimestamp()
              });
            } catch (e) { console.error("提交失败", e); }
          }
        }
        initGame();
      }

      // 排行榜实时同步
      function setupLeaderboard() {
        if (!window.fbHelper) { setTimeout(setupLeaderboard, 500); return; }
        const { db, collection, query, orderBy, limit, onSnapshot } = window.fbHelper;
        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(5));

        onSnapshot(q, (snapshot) => {
          const listEl = document.getElementById('scoreList');
          let html = '';
          snapshot.forEach(doc => {
            const d = doc.data();
            html += `<div class="score-row"><span>${d.name || '匿名'}</span><b>${d.score}</b></div>`;
          });
          listEl.innerHTML = html || '暂无数据';
        });
      }

      // 输入控制
      window.handleInput = (dir) => {
        if (gameState !== 'PLAYING') initGame();
        if (dir === 'up' && direction.row === 0) direction = {row:-1, col:0};
        if (dir === 'down' && direction.row === 0) direction = {row:1, col:0};
        if (dir === 'left' && direction.col === 0) direction = {row:0, col:-1};
        if (dir === 'right' && direction.col === 0) direction = {row:0, col:1};
      };

      setupLeaderboard();
      requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
