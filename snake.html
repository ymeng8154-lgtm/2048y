<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🐍 贪吃蛇 · 全球实时竞技版</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWsI-pxmzZpT3lsBauAizFiUuKdxF1MYA",
      authDomain: "harmony-game-ab90f.firebaseapp.com",
      projectId: "harmony-game-ab90f",
      storageBucket: "harmony-game-ab90f.firebasestorage.app",
      messagingSenderId: "623058222252",
      appId: "1:623058222252:web:c5089e10a72b5d4db53309",
      measurementId: "G-D19SLRF6KS"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      window.fbHelper = { db, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp };
    } catch (e) {
      console.error("Firebase 初始化失败:", e);
    }
  </script>

  <style>
    /* 保留道具版原有的所有样式 */
    :root {
      --bg: #1a1a2e;
      --panel-bg: rgba(20, 20, 40, 0.9);
      --text: #e0e0e0;
      --gold: #ffd700;
      --accent: #4ecb71;
      --danger: #e74c3c;
      --highlight: #5b8cff;
      --btn-bg: rgba(30, 30, 50, 0.85);
      --btn-border: #3a3a55;
      --btn-active: #4ecb71;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      padding: 10px;
      background-image: radial-gradient(ellipse at 30% 20%, rgba(78, 203, 113, 0.06) 0%, transparent 60%);
      touch-action: manipulation;
    }

    /* 新增：排行榜 UI 样式 */
    #liveLeaderboard {
      position: fixed; left: 15px; top: 15px; width: 160px;
      background: var(--panel-bg); border: 1px solid var(--btn-border);
      border-radius: 12px; padding: 10px; z-index: 1000; color: #fff;
      backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    #liveLeaderboard h3 { font-size: 0.8rem; color: var(--gold); text-align: center; margin-bottom: 8px; }
    .rank-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .rank-name { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-score { color: var(--accent); font-weight: bold; }

    /* 游戏原有容器样式 */
    .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 600px; }
    .game-header { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 8px 16px; background: var(--panel-bg); border: 1px solid var(--btn-border); border-radius: 14px; color: #fff; }
    .canvas-container { position: relative; border-radius: 16px; overflow: hidden; width: 100%; aspect-ratio: 1/1; background: #111827; }
    canvas { display: block; width: 100%; height: 100%; }
    .dpad-container { display: grid; grid-template-columns: repeat(3, 80px); gap: 6px; margin-top: 8px; }
    .dpad-btn { background: var(--btn-bg); border: 2px solid var(--btn-border); border-radius: 16px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #ccc; cursor: pointer; }
    .dpad-btn:active { background: var(--btn-active); transform: scale(0.95); }

    @media (max-width: 800px) {
      #liveLeaderboard { position: relative; width: 100%; max-width: 600px; left: 0; top: 0; margin-bottom: 10px; }
    }
  </style>
</head>
<body>

  <div id="liveLeaderboard">
    <h3>🏆 全球排行</h3>
    <div id="rankList">同步中...</div>
  </div>

  <div class="game-wrapper">
    <div class="game-header">
      <div id="scoreDisplay" style="color:var(--accent); font-weight:bold; font-size:1.2rem;">🍎 0</div>
      <div>速度: <span id="speedLevel">1</span></div>
      <div id="powerupHint" style="display:none; color:var(--gold)"></div>
    </div>

    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div class="dpad-container">
      <div style="grid-column:2" class="dpad-btn" data-dir="up">⬆️</div>
      <div style="grid-column:1; grid-row:2" class="dpad-btn" data-dir="left">⬅️</div>
      <div style="grid-column:3; grid-row:2" class="dpad-btn" data-dir="right">➡️</div>
      <div style="grid-column:2; grid-row:3" class="dpad-btn" data-dir="down">⬇️</div>
    </div>
    <p id="hintText" style="color:#888; font-size:0.8rem; margin-top:8px;">💡 按空格或方向键或点击画布开始</p>
  </div>

  <script>
    /* 这里包含了你原版所有的道具逻辑 */
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const canvasContainer = document.getElementById('canvasContainer');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const speedLevelEl = document.getElementById('speedLevel');
      const hintText = document.getElementById('hintText');
      const powerupHint = document.getElementById('powerupHint');
      const dpadBtns = document.querySelectorAll('.dpad-btn');

      const COLS = 30, ROWS = 30, CELL_SIZE = 20;
      canvas.width = COLS * CELL_SIZE; canvas.height = ROWS * CELL_SIZE;

      const GameState = { IDLE: 'idle', PLAYING: 'playing', GAME_OVER: 'gameOver' };
      let gameState = GameState.IDLE;
      let snake = [], direction = {row:0, col:1}, directionQueue = [], food = null, obstacles = [], score = 0;
      let lastMoveTime = 0, currentInterval = 180, animationFrameId = null;
      let superFoodActive = false, attractActive = false, attractEndTime = 0, particles = [];

      // 音效与粒子系统 (保留原版代码)
      let audioCtx = null;
      function getAudioContext() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
      function playSound(freq, ramp, type='sine') {
        try { const c=getAudioContext(), n=c.currentTime, o=c.createOscillator(), g=c.createGain();
        o.type=type; o.frequency.setValueAtTime(freq,n); o.frequency.exponentialRampToValueAtTime(ramp,n+0.1);
        g.gain.setValueAtTime(0.1,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.1);
        o.connect(g).connect(c.destination); o.start(); o.stop(n+0.2); } catch(e){}
      }

      function spawnParticles(row, col, color) {
        for(let i=0; i<10; i++) particles.push({
          x: col*CELL_SIZE+10, y: row*CELL_SIZE+10,
          vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
          life: 1, color: color
        });
      }

      // --- Firebase 核心功能整合 ---

      // 1. 实时监听排行榜
      function setupLeaderboardSync() {
        if (!window.fbHelper) { setTimeout(setupLeaderboardSync, 500); return; }
        const { db, collection, query, orderBy, limit, onSnapshot } = window.fbHelper;
        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));

        onSnapshot(q, (snapshot) => {
          const listEl = document.getElementById('rankList');
          let html = '';
          snapshot.forEach(doc => {
            const d = doc.data();
            html += `<div class="rank-item"><span class="rank-name">${d.name}</span><span class="rank-score">${d.score}</span></div>`;
          });
          listEl.innerHTML = html || '暂无数据';
        });
      }

      // 2. 修改 endGame 函数以支持上传
      async function endGame() {
        gameState = GameState.GAME_OVER;
        playSound(300, 50, 'sawtooth');
        canvasContainer.classList.add('game-over-glow');
        
        if (score > 0 && window.fbHelper) {
          const finalScore = score;
          setTimeout(async () => {
            const name = prompt(`游戏结束！得分: ${finalScore}\n请输入昵称登榜:`, "匿名特工");
            if (name) {
              const { db, collection, addDoc, serverTimestamp } = window.fbHelper;
              try {
                await addDoc(collection(db, "scores"), {
                  name: name.substring(0, 8),
                  score: finalScore,
                  time: serverTimestamp()
                });
              } catch (e) { console.error("上传失败", e); }
            }
          }, 500);
        }
      }

      // 游戏逻辑函数 (保持道具版逻辑)
      function initGame() {
        snake = [{row:15,col:10},{row:15,col:11},{row:15,col:12}];
        direction = {row:0,col:1}; directionQueue = []; score = 0;
        obstacles = []; for(let i=0;i<10;i++) obstacles.push({row:Math.floor(Math.random()*ROWS), col:Math.floor(Math.random()*COLS)});
        spawnFood(); gameState = GameState.PLAYING;
        canvasContainer.classList.remove('game-over-glow');
        updateUI();
      }

      function spawnFood() { food = {row:Math.floor(Math.random()*ROWS), col:Math.floor(Math.random()*COLS)}; }

      function updateUI() {
        scoreDisplay.textContent = `🍎 ${score}`;
        powerupHint.style.display = attractActive ? 'block' : 'none';
        powerupHint.textContent = attractActive ? '🧲 吸星大法激活' : '';
      }

      function move() {
        if(directionQueue.length) direction = directionQueue.shift();
        const head = snake[snake.length-1];
        const newHead = {row: head.row+direction.row, col: head.col+direction.col};

        if(newHead.row<0 || newHead.row>=ROWS || newHead.col<0 || newHead.col>=COLS || 
           obstacles.some(o=>o.row===newHead.row&&o.col===newHead.col) ||
           snake.some(s=>s.row===newHead.row&&s.col===newHead.col)) {
          endGame(); return;
        }

        snake.push(newHead);
        if(newHead.row===food.row && newHead.col===food.col) {
          score += 10; spawnParticles(food.row, food.col, '#ff6b6b');
          playSound(600, 900); spawnFood(); updateUI();
          if(score % 50 === 0) { attractActive=true; attractEndTime=performance.now()+5000; }
        } else {
          snake.shift();
        }
      }

      function draw() {
        ctx.fillStyle = '#111827'; ctx.fillRect(0,0,canvas.width,canvas.height);
        obstacles.forEach(o => { ctx.fillStyle='#4a4250'; ctx.fillRect(o.col*CELL_SIZE+1, o.row*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2); });
        ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(food.col*CELL_SIZE+10, food.row*CELL_SIZE+10, 8, 0, Math.PI*2); ctx.fill();
        snake.forEach((s,i) => { ctx.fillStyle=i===snake.length-1?'#4ecb71':'#2e7d32'; ctx.fillRect(s.col*CELL_SIZE+1, s.row*CELL_SIZE+1, CELL_SIZE-2, CELL_SIZE-2); });
        
        particles.forEach((p,i) => {
          p.x+=p.vx; p.y+=p.vy; p.life-=0.02;
          ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fillRect(p.x,p.y,2,2);
          if(p.life<=0) particles.splice(i,1);
        });
        ctx.globalAlpha=1;
      }

      function gameLoop(t) {
        if(gameState===GameState.PLAYING && t-lastMoveTime>currentInterval) { move(); lastMoveTime=t; }
        if(attractActive && t>attractEndTime) attractActive=false;
        draw(); requestAnimationFrame(gameLoop);
      }

      // 控制与启动
      window.addEventListener('keydown', e => {
        const d = {ArrowUp:{row:-1,col:0},ArrowDown:{row:1,col:0},ArrowLeft:{row:0,col:-1},ArrowRight:{row:0,col:1}}[e.key];
        if(d) { e.preventDefault(); if(gameState!==GameState.PLAYING) initGame(); else directionQueue.push(d); }
      });

      dpadBtns.forEach(btn => btn.addEventListener('click', () => {
        const d = {up:{row:-1,col:0},down:{row:1,col:0},left:{row:0,col:-1},right:{row:0,col:1}}[btn.dataset.dir];
        if(gameState!==GameState.PLAYING) initGame(); else directionQueue.push(d);
      }));

      canvas.addEventListener('click', () => { if(gameState!==GameState.PLAYING) initGame(); });

      setupLeaderboardSync();
      requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
