      function setupLeaderboardSync() {
        if (!window.fbHelper) { setTimeout(setupLeaderboardSync, 500); return; }
        const { db, collection, query, orderBy, limit, onSnapshot } = window.fbHelper;
        
        // 查询前十名，按分数倒序排列
        const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
        
        onSnapshot(q, (snapshot) => {
          const rankList = document.getElementById('rankList');
          let html = '';
          snapshot.forEach((doc) => {
            const data = doc.data();
            html += `
              <div class="rank-item">
                <span class="rank-name">${data.name || '匿名玩家'}</span>
                <span class="rank-score">${data.score}</span>
              </div>`;
          });
          rankList.innerHTML = html || '<div style="text-align:center;color:#666">暂无数据</div>';
        });
      }

      // 2. 游戏结束时保存分数
      async function saveScoreToFirebase(finalScore) {
        if (!window.fbHelper || finalScore <= 0) return;
        
        const playerName = prompt("挑战结束！分数: " + finalScore + "\n请输入你的昵称进入全球排行:", "匿名特工");
        if (!playerName) return;

        const { db, collection, addDoc, serverTimestamp } = window.fbHelper;
        try {
          await addDoc(collection(db, "leaderboard"), {
            name: playerName.slice(0, 10),
            score: finalScore,
            createdAt: serverTimestamp()
          });
        } catch (e) {
          console.error("上传失败: ", e);
        }
